name: x-ai-weekly-bot

services:
  x-ai-weekly-bot:
    image: ghcr.io/wifsimster/x-ai-weekly-bot:latest
    container_name: x-ai-weekly-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - bot-data:/app/data
    env_file:
      - .env
    environment:
      - TZ=Europe/Paris
      - NODE_ENV=production
      - WEB_PORT=3000
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      lan:

volumes:
  bot-data:

networks:
  lan:
    external: true
