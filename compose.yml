name: x-ai-weekly-bot

services:
  x-ai-weekly-bot:
    image: ghcr.io/wifsimster/x-ai-weekly-bot:latest
    container_name: x-ai-weekly-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - bot-data:/app/data
    env_file:
      - .env
    environment:
      - TZ=Europe/Paris
      - NODE_ENV=production
      - X_API_KEY=${X_API_KEY}
      - X_API_SECRET=${X_API_SECRET}
      - X_ACCESS_TOKEN=${X_ACCESS_TOKEN}
      - X_ACCESS_TOKEN_SECRET=${X_ACCESS_TOKEN_SECRET}
      - X_USERNAME=${X_USERNAME}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - WEB_PORT=3000
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      lan:

volumes:
  bot-data:

networks:
  lan:
    external: true
